version: "3.9"
services:
  api:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    env_file:
      - .env.example
    command: bash -lc "pip install -r requirements-dev.txt && PYTHONPATH=apps/api:packages/shared-schema:packages/agent-runtime:packages/model-gateway:packages/tool-hub:packages/knowledge-service:packages/memory-service:packages/audit-service:packages/im-adapter python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --app-dir apps/api"
    ports:
      - "8000:8000"
  web:
    image: node:20-alpine
    working_dir: /workspace
    volumes:
      - ./:/workspace
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://api:8000
    command: sh -lc "npm install && npm --workspace apps/web run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    depends_on:
      - api
